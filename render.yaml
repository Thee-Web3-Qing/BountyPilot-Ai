# Render.com deployment configuration for BountyPilot API Server
# Create a new Blueprint on Render and point it to this file

services:
  - type: web
    name: bountypilot-api
    env: node
    region: oregon
    plan: free
    branch: main
    rootDir: .
    buildCommand: |
      npm install -g pnpm@10.26.1
      pnpm install --no-frozen-lockfile
      pnpm --filter @workspace/api-server run build
    startCommand: node artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false  # Set this manually in Render dashboard
      - key: JWT_SECRET
        sync: false  # Set this manually in Render dashboard (generate with: openssl rand -base64 32)
      - key: QWEN_API_KEY
        sync: false  # Set this manually in Render dashboard
      - key: CORS_ORIGIN
        value: https://bounty-pilot-ai.vercel.app
    healthCheckPath: /api/healthz
