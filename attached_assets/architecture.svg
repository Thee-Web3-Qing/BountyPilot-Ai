<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" width="900" height="620" font-family="'Courier New', Courier, monospace">
  <!-- Background -->
  <rect width="900" height="620" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" fill="#c8ff00" font-size="18" font-weight="bold" letter-spacing="3">BOUNTYPILOT AI — SYSTEM ARCHITECTURE</text>
  <text x="450" y="60" text-anchor="middle" fill="#aaa" font-size="11">Powered by Alibaba Cloud · Qwen AI</text>

  <!-- ═══ USER ═══ -->
  <rect x="350" y="80" width="200" height="54" rx="8" fill="#141414" stroke="#c8ff00" stroke-width="1.5"/>
  <text x="450" y="104" text-anchor="middle" fill="#c8ff00" font-size="11" font-weight="bold">👤 USER / BROWSER</text>
  <text x="450" y="122" text-anchor="middle" fill="#ccc" font-size="10">Web3 Content Creator</text>

  <!-- Arrow: User → Frontend -->
  <line x1="450" y1="134" x2="450" y2="158" stroke="#c8ff00" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="450,162 445,152 455,152" fill="#c8ff00"/>
  <text x="460" y="150" fill="#bbb" font-size="9">HTTPS</text>

  <!-- ═══ FRONTEND ═══ -->
  <rect x="260" y="162" width="380" height="70" rx="8" fill="#111" stroke="#3a3a3a" stroke-width="1.5"/>
  <text x="450" y="186" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">FRONTEND</text>
  <text x="450" y="204" text-anchor="middle" fill="#ddd" font-size="10">React 18 + TypeScript + Vite</text>
  <text x="450" y="220" text-anchor="middle" fill="#bbb" font-size="9">TanStack Query · Tailwind CSS · shadcn/ui · Wouter · Replit</text>

  <!-- Arrow: Frontend → API Server -->
  <line x1="450" y1="232" x2="450" y2="256" stroke="#aaa" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="450,260 445,250 455,250" fill="#aaa"/>
  <text x="460" y="249" fill="#bbb" font-size="9">REST API / JWT</text>

  <!-- ═══ API SERVER ═══ -->
  <rect x="200" y="260" width="500" height="70" rx="8" fill="#111" stroke="#3a3a3a" stroke-width="1.5"/>
  <text x="450" y="284" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">API SERVER</text>
  <text x="450" y="302" text-anchor="middle" fill="#ddd" font-size="10">Node.js + Express + TypeScript + Drizzle ORM</text>
  <text x="450" y="318" text-anchor="middle" fill="#bbb" font-size="9">Auth · Bounty Routes · Waitlist · Admin · AI Orchestration · Replit</text>

  <!-- Three arrows down from API Server -->
  <!-- Left: PostgreSQL -->
  <line x1="300" y1="330" x2="170" y2="380" stroke="#aaa" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="166,383 165,372 175,376" fill="#aaa"/>

  <!-- Center: Qwen Cloud -->
  <line x1="450" y1="330" x2="450" y2="378" stroke="#c8ff00" stroke-width="2"/>
  <polygon points="450,382 445,372 455,372" fill="#c8ff00"/>

  <!-- Right: Web Crawler -->
  <line x1="600" y1="330" x2="730" y2="380" stroke="#aaa" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="734,383 725,376 735,372" fill="#aaa"/>

  <!-- ═══ POSTGRESQL ═══ -->
  <rect x="60" y="382" width="220" height="70" rx="8" fill="#111" stroke="#3a3a3a" stroke-width="1.5"/>
  <text x="170" y="406" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">PostgreSQL DB</text>
  <text x="170" y="424" text-anchor="middle" fill="#ddd" font-size="10">Replit Managed Database</text>
  <text x="170" y="440" text-anchor="middle" fill="#bbb" font-size="9">Users · Bounties · Waitlist · Sessions</text>

  <!-- ═══ QWEN AI (Alibaba Cloud) ═══ -->
  <rect x="290" y="382" width="320" height="90" rx="8" fill="#0f1a00" stroke="#c8ff00" stroke-width="2"/>
  <!-- Alibaba Cloud label -->
  <rect x="310" y="372" width="120" height="18" rx="4" fill="#c8ff00"/>
  <text x="370" y="384" text-anchor="middle" fill="#000" font-size="9" font-weight="bold">☁ ALIBABA CLOUD</text>
  <text x="450" y="410" text-anchor="middle" fill="#c8ff00" font-size="13" font-weight="bold">Qwen AI API</text>
  <text x="450" y="428" text-anchor="middle" fill="#ddd" font-size="10">qwen-long · qwen-turbo</text>
  <text x="450" y="444" text-anchor="middle" fill="#bbb" font-size="9">Bounty Scoring  ·  Research Briefs</text>
  <text x="450" y="458" text-anchor="middle" fill="#bbb" font-size="9">Production Plans  ·  Caption Generation</text>

  <!-- ═══ WEB CRAWLER ═══ -->
  <rect x="620" y="382" width="220" height="70" rx="8" fill="#111" stroke="#3a3a3a" stroke-width="1.5"/>
  <text x="730" y="406" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">Web Crawler</text>
  <text x="730" y="424" text-anchor="middle" fill="#ddd" font-size="10">Custom HTTP Scraper</text>
  <text x="730" y="440" text-anchor="middle" fill="#bbb" font-size="9">Node.js + Cheerio</text>

  <!-- Arrow: Web Crawler → Platforms -->
  <line x1="730" y1="452" x2="730" y2="476" stroke="#aaa" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="730,480 725,470 735,470" fill="#aaa"/>

  <!-- ═══ BOUNTY PLATFORMS ═══ -->
  <rect x="580" y="480" width="300" height="60" rx="8" fill="#111" stroke="#444" stroke-width="1.5"/>
  <text x="730" y="503" text-anchor="middle" fill="#ddd" font-size="11" font-weight="bold">BOUNTY PLATFORMS</text>
  <text x="730" y="522" text-anchor="middle" fill="#bbb" font-size="10">Superteam · Layer3 · Dework · Gitcoin</text>

  <!-- Data flow label -->
  <text x="450" y="558" text-anchor="middle" fill="#888" font-size="9">— — — — Scored bounties stored to PostgreSQL after AI evaluation — — — —</text>

  <!-- Legend -->
  <rect x="30" y="570" width="14" height="10" rx="2" fill="#0f1a00" stroke="#c8ff00" stroke-width="1.5"/>
  <text x="50" y="580" fill="#ccc" font-size="9">Alibaba Cloud / Qwen</text>
  <rect x="170" y="570" width="14" height="10" rx="2" fill="#111" stroke="#3a3a3a" stroke-width="1.5"/>
  <text x="190" y="580" fill="#ccc" font-size="9">Replit Infrastructure</text>
  <line x1="295" y1="575" x2="315" y2="575" stroke="#c8ff00" stroke-width="2"/>
  <text x="320" y="580" fill="#ccc" font-size="9">AI data flow</text>
  <line x1="400" y1="575" x2="420" y2="575" stroke="#aaa" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="425" y="580" fill="#ccc" font-size="9">Standard data flow</text>
</svg>
