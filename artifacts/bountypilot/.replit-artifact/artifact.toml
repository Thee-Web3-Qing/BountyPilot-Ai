kind = "web"
previewPath = "/"
title = "BountyPilot AI"
version = "1.0.0"
id = "artifacts/bountypilot"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18933

[services.development]
run = "pnpm --filter @workspace/bountypilot run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bountypilot", "run", "build" ]
publicDir = "artifacts/bountypilot/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18933"
BASE_PATH = "/"
