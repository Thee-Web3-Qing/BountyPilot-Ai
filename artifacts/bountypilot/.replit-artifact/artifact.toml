kind = "web"
previewPath = "/"
title = "BountyPilot AI"
version = "1.0.0"
id = "artifacts/bountypilot"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18933

[services.development]
run = "pnpm --filter @workspace/bountypilot run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bountypilot", "run", "build" ]
publicDir = "artifacts/bountypilot/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/pricing"
to = "/pricing/index.html"

[[services.production.rewrites]]
from = "/pricing/"
to = "/pricing/index.html"

[[services.production.rewrites]]
from = "/"
to = "/index.html"

[[services.production.rewrites]]
from = "/login"
to = "/index.html"

[[services.production.rewrites]]
from = "/login-otp"
to = "/index.html"

[[services.production.rewrites]]
from = "/signup"
to = "/index.html"

[[services.production.rewrites]]
from = "/forgot-password"
to = "/index.html"

[[services.production.rewrites]]
from = "/reset-password"
to = "/index.html"

[[services.production.rewrites]]
from = "/discover"
to = "/index.html"

[[services.production.rewrites]]
from = "/bounties"
to = "/index.html"

[[services.production.rewrites]]
from = "/bounties/*"
to = "/index.html"

[[services.production.rewrites]]
from = "/submissions"
to = "/index.html"

[[services.production.rewrites]]
from = "/earnings"
to = "/index.html"

[[services.production.rewrites]]
from = "/profile"
to = "/index.html"

[[services.production.rewrites]]
from = "/settings"
to = "/index.html"

[[services.production.rewrites]]
from = "/referral"
to = "/index.html"

[[services.production.rewrites]]
from = "/launchpad"
to = "/index.html"

[[services.production.rewrites]]
from = "/admin"
to = "/index.html"

[services.env]
PORT = "18933"
BASE_PATH = "/"
